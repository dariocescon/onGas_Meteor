version: '3.8'

# Docker Compose per InfluxDB 2.x — ambiente di sviluppo locale
# Uso: docker compose -f docker-compose-influxdb.yml up -d
# UI: http://localhost:8086 (admin / adminpassword)

services:
  influxdb:
    image: influxdb:2.7
    container_name: ongas-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: ongas
      DOCKER_INFLUXDB_INIT_BUCKET: oneGasDB
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
      DOCKER_INFLUXDB_INIT_RETENTION: 0s
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  influxdb-data:
