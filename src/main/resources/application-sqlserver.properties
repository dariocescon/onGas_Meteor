# ============================================
# InfluxDB Profile Configuration
# ============================================
# Attivare con: --spring.profiles.active=influxdb
# Architettura ibrida: InfluxDB per time-series, SQL per comandi

database.type=sqlserver

# ============================================
# SQL Server Configuration
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=oneGasDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=${SQL_DB_USERNAME}
spring.datasource.password=${SQL_DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate=OFF

# Opzione C: H2 in-memory (solo per sviluppo/test locale, nessuna installazione SQL richiesta)
# Decommentare le righe seguenti e commentare Opzione A per usare H2:
#spring.datasource.url=jdbc:h2:mem:oneGasDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# ============================================
# HikariCP Connection Pool Configuration
# ============================================
# Numero massimo di connessioni nel pool
spring.datasource.hikari.maximum-pool-size=100
# Connessioni minime mantenute idle nel pool
spring.datasource.hikari.minimum-idle=10
# Timeout per ottenere una connessione dal pool (ms)
spring.datasource.hikari.connection-timeout=10000

