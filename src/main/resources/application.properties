# ============================================
# Application Configuration
# ============================================
spring.application.name=oneGas_Meteor
server.port=${ONE_GAS_METEOR_SERVER_PORT:8081}
tcp.server.port=${ONE_GAS_METEOR_TCP_SERVER_PORT:8091}
# Numero massimo di connessioni TCP concorrenti (protezione sovraccarico)
tcp.server.max-connections=10000
# Dimensione coda connessioni in attesa del ServerSocket
tcp.server.backlog=1024

# ============================================
# Device Configuration
# ============================================
# Tipi di device abilitati (comma-separated)
device.enabled.types=TEK822V1,TEK822V2,TEK586

# ============================================
# Database Configuration
# ============================================
# Tipo: sqlserver o mongodb
database.type=sqlserver
#database.type=mongodb

# ============================================
# SQL Server Configuration
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=oneGasDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=${SQL_DB_USERNAME}
spring.datasource.password=${SQL_DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate=OFF

# ============================================
# HikariCP Connection Pool Configuration
# ============================================
# Numero massimo di connessioni nel pool
spring.datasource.hikari.maximum-pool-size=100
# Connessioni minime mantenute idle nel pool
spring.datasource.hikari.minimum-idle=10
# Timeout per ottenere una connessione dal pool (ms)
spring.datasource.hikari.connection-timeout=10000

# ============================================
# MongoDB Configuration (alternativa)
# ============================================
#spring.data.mongodb.uri=mongodb://admin:password@localhost:27017/oneGasDB?authSource=admin
#spring.data.mongodb.database=oneGasDB

# Optional: Authentication
# spring.data.mongodb.username=mongouser
# spring.data.mongodb.password=mongopass
# spring.data.mongodb.authentication-database=admin

# Disable JPA (non serve con MongoDB)
#spring.autoconfigure.exclude=\
#  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
#  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ============================================
# Telemetry Processing
# ============================================
# Max comandi da inviare in una risposta
command.max.per.response=10
# Timeout per elaborazione messaggio (ms)
telemetry.processing.timeout=5000

# ============================================
# Data Cleanup Configuration
# ============================================
# Abilita/disabilita cleanup automatico
cleanup.enabled=false

# Cron expression per scheduling
# Default: ogni notte alle 2:00 AM
# Format: "secondo minuto ora giorno mese giorno_settimana"
cleanup.cron=0 0 2 * * *

# Retention policy (giorni)
cleanup.telemetry.retention.days=30
cleanup.commands.retention.days=7
cleanup.metrics.retention.days=90

# Alternative cron expressions:
# Ogni 5 minuti (per test): 0 */5 * * * *
# Ogni ora: 0 0 * * * *
# Ogni domenica alle 3 AM: 0 0 3 * * SUN
# Ogni giorno alle 23:00: 0 0 23 * * *

# ============================================
# Processing Metrics Configuration
# ============================================
# Abilita/disabilita salvataggio metriche di performance su DB
metrics.enabled=true

# ============================================
# Batch INSERT configuration
# ============================================
batch.insert.size=500
batch.insert.interval-ms=2000

# ============================================
# Logging
# ============================================
logging.level.com.aton.proj.oneGasMeteor=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.config=classpath:log4j2.properties

# Abilita debug logging per Spring Integration
logging.level.org.springframework.integration=DEBUG
logging.level.org.springframework.integration.ip=TRACE