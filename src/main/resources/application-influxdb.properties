# ============================================
# InfluxDB Profile Configuration
# ============================================
# Attivare con: --spring.profiles.active=influxdb
# Architettura ibrida: InfluxDB per time-series, SQL per comandi

database.type=influxdb

# ============================================
# InfluxDB 2.x Connection
# ============================================
influxdb.url=${INFLUXDB_URL:http://localhost:8086}
influxdb.token=${INFLUXDB_TOKEN:my-super-secret-token}
influxdb.org=${INFLUXDB_ORG:ongas}
influxdb.bucket=${INFLUXDB_BUCKET:oneGasDB}

# ============================================
# SQL per device_commands (SqlServer o PostgreSQL)
# ============================================
# Opzione A: SQL Server (default)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=oneGasDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=${SQL_DB_USERNAME}
spring.datasource.password=${SQL_DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Opzione B: PostgreSQL (decommentare e commentare Opzione A)
#spring.datasource.url=jdbc:postgresql://localhost:5432/oneGasDB
#spring.datasource.username=${SQL_DB_USERNAME}
#spring.datasource.password=${SQL_DB_PASSWORD}
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Opzione C: H2 in-memory (solo per sviluppo/test locale, nessuna installazione SQL richiesta)
# Decommentare le righe seguenti e commentare Opzione A per usare H2:
#spring.datasource.url=jdbc:h2:mem:oneGasDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA: auto-create per creare le tabelle SQL necessarie (device_commands)
# Le altre tabelle (telemetry_data, etc.) vengono create ma non usate
spring.jpa.hibernate.ddl-auto=update
