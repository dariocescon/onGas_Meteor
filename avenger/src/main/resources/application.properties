spring.application.name=Avenger

# Target server
avenger.target.host=localhost
avenger.target.port=8091

# Stress test config
avenger.devices.total=1000
avenger.devices.per-batch=300
avenger.batch.interval-ms=60000
avenger.tcp.timeout-seconds=60
avenger.measurements.min=3
avenger.measurements.max=10

# Logging
logging.level.com.aton.proj.avenger=INFO
